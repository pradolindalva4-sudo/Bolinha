<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HELENA v13.6 - SUPREME JDP</title>
    
    <!-- PWA CONFIG -->
    <meta name="theme-color" content="#00f3ff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root { --neon: #00f3ff; --bg: #050505; --panel: #111; }
        body { 
            margin: 0; background: var(--bg); color: var(--neon); 
            font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; 
        }

        /* BOLINHA FLUTUANTE SUPREME */
        #robot-core {
            position: fixed; width: 65px; height: 65px;
            background: radial-gradient(circle, var(--neon), #00444d);
            border-radius: 50%; box-shadow: 0 0 20px var(--neon);
            z-index: 10000; bottom: 20px; right: 20px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: 2px solid #fff;
            touch-action: none; transition: transform 0.2s;
        }

        /* PAINEL DE COMANDO */
        #main-panel {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 9999;
            display: none; flex-direction: column; padding: 20px; box-sizing: border-box;
        }

        #main-panel.active { display: flex; animation: fadeIn 0.3s; }

        .terminal {
            flex: 1; background: #000; border: 1px solid #333;
            padding: 15px; overflow-y: auto; font-family: 'Courier New', monospace;
            font-size: 13px; color: #00ff00; margin-top: 50px;
        }

        .input-group {
            display: flex; gap: 10px; margin-top: 15px;
        }

        input {
            flex: 1; background: #111; border: 1px solid var(--neon);
            color: var(--neon); padding: 12px; outline: none;
        }

        .btn {
            background: var(--neon); color: #000; border: none;
            padding: 12px 20px; font-weight: bold; cursor: pointer;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* ESCONDER INPUT DE ARQUIVO REAL */
        #file-engine { display: none; }
    </style>
</head>
<body>

    <div id="robot-core" onclick="togglePanel()">
        <div style="width:15px; height:15px; background:#fff; border-radius:50%; animation: pulse 1s infinite;"></div>
    </div>

    <div id="main-panel">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <h2 style="margin:0; font-size: 18px;">HELENA v13.6 - KERNEL JDP</h2>
            <button class="btn" style="background:red; color:white;" onclick="togglePanel()">FECHAR</button>
        </div>

        <div class="terminal" id="console">
            > SISTEMA ONLINE NO GITHUB.<br>
            > STATUS: AGUARDANDO SINCRONIZAÇÃO INDUSTRIAL.<br>
            > SR. JOSÉ, CLIQUE NO BOTÃO ABAIXO PARA "ALIMENTAR" MEU BANCO DE DADOS.
        </div>

        <div class="input-group">
            <button class="btn" onclick="triggerScan()">SINCRONIZAR PASTA</button>
            <input type="text" id="cmdInput" placeholder="Diga: 'Abra o arquivo X'...">
            <button class="btn" onclick="execCommand()">IR</button>
        </div>
    </div>

    <!-- MECANISMO OCULTO DE CAPTURA -->
    <input type="file" id="file-engine" webkitdirectory directory multiple onchange="indexFiles(this.files)">

    <script>
        const consoleEl = document.getElementById('console');
        const panel = document.getElementById('main-panel');
        let fileDatabase = [];

        function log(msg, color = "#00ff00") {
            const div = document.createElement('div');
            div.style.color = color;
            div.innerHTML = `> [${new Date().toLocaleTimeString()}] ${msg}`;
            consoleEl.appendChild(div);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        function togglePanel() {
            panel.classList.toggle('active');
            if(panel.classList.contains('active')) log("Interface Neural Ativada.");
        }

        function triggerScan() {
            log("SOLICITANDO ACESSO AO ARMAZENAMENTO...", "yellow");
            document.getElementById('file-engine').click();
        }

        // ESTA É A FUNÇÃO QUE "LÊ" O CELULAR
        function indexFiles(files) {
            fileDatabase = Array.from(files);
            log(`SINCRONIZAÇÃO CONCLUÍDA!`, var(--neon));
            log(`${fileDatabase.length} ARQUIVOS MAPEADOS NA MEMÓRIA.`, "#fff");
            log(`AGORA EU SEI TUDO O QUE TEM NESSA PASTA.`, var(--neon));
        }

        function execCommand() {
            const cmd = document.getElementById('cmdInput').value.toLowerCase();
            document.getElementById('cmdInput').value = '';

            if(cmd.includes("abra") || cmd.includes("buscar")) {
                const target = cmd.replace("abra", "").replace("arquivo", "").trim();
                log(`BUSCANDO POR: ${target}...`, "white");

                const found = fileDatabase.find(f => f.name.toLowerCase().includes(target));

                if(found) {
                    log(`ARQUIVO LOCALIZADO: ${found.name}`, var(--neon));
                    log(`ABRINDO...`);
                    const url = URL.createObjectURL(found);
                    window.open(url, '_blank');
                } else {
                    log(`ERRO: ARQUIVO "${target}" NÃO ENCONTRADO NO MAPEAMENTO.`, "red");
                }
            } else {
                log(`COMANDO NÃO RECONHECIDO. TENTE "ABRA [NOME DO ARQUIVO]".`, "yellow");
            }
        }

        // Lógica para arrastar a bolinha (Mobile)
        const core = document.getElementById('robot-core');
        core.addEventListener('touchmove', function(e) {
            var touchLocation = e.targetTouches[0];
            core.style.left = touchLocation.pageX - 32 + 'px';
            core.style.top = touchLocation.pageY - 32 + 'px';
        });

    </script>
</body>
</html>
