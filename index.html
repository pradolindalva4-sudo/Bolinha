<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HELENA v15.0 - JDP OS</title>
    <style>
        :root { --neon: #00f3ff; --bg: #050505; --danger: #ff003c; }
        body { margin: 0; background: var(--bg); color: var(--neon); font-family: 'Orbitron', sans-serif; overflow: hidden; }
        
        /* INTERFACE INDUSTRIAL */
        #os-container { position: fixed; width: 100vw; height: 100vh; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; border: 4px solid #1a1a1a; }
        
        #header { display: flex; justify-content: space-between; border-bottom: 2px solid var(--neon); padding-bottom: 10px; margin-bottom: 15px; font-size: 12px; }

        #display { flex: 1; background: rgba(0,0,0,0.8); border: 1px solid #222; border-radius: 5px; overflow-y: auto; padding: 15px; font-family: monospace; font-size: 14px; box-shadow: inset 0 0 20px #000; }

        .line { margin-bottom: 8px; border-left: 3px solid var(--neon); padding-left: 10px; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        /* COMANDOS */
        #input-area { margin-top: 20px; display: flex; gap: 10px; }
        input { flex: 1; background: #111; border: 1px solid var(--neon); color: var(--neon); padding: 15px; border-radius: 5px; font-size: 16px; outline: none; box-shadow: 0 0 10px rgba(0,243,255,0.2); }
        
        .btn-core { background: var(--neon); color: #000; border: none; padding: 0 25px; font-weight: bold; border-radius: 5px; cursor: pointer; text-transform: uppercase; }

        /* BOTÕES RÁPIDOS */
        .quick-access { display: flex; gap: 10px; margin-top: 15px; overflow-x: auto; padding-bottom: 10px; }
        .chip { background: #1a1a1a; border: 1px solid #333; padding: 8px 15px; border-radius: 20px; font-size: 10px; white-space: nowrap; cursor: pointer; }
        .chip:active { background: var(--neon); color: #000; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="os-container">
        <div id="header">
            <span>SISTEMA: HELENA v15.0</span>
            <span>STATUS: AUTORIDADE MÁXIMA</span>
            <span id="clock">00:00:00</span>
        </div>

        <div id="display">
            <div class="line" style="color: white;">BEM-VINDO, SR. JOSÉ DIVINO PRADO DA LAPA.</div>
            <div class="line">AGUARDANDO COMANDO DE VOZ OU TEXTO...</div>
        </div>

        <div class="quick-access">
            <div class="chip" onclick="mapear()">[+] MAPEAR CELULAR</div>
            <div class="chip" onclick="comandoRapido('Abra o WhatsApp')">WHATSAPP</div>
            <div class="chip" onclick="comandoRapido('Abra o YouTube')">YOUTUBE</div>
            <div class="chip" onclick="comandoRapido('Abra o Maps')">MAPS</div>
            <div class="chip" onclick="limpar()">LIMPAR TERMINAL</div>
        </div>

        <div id="input-area">
            <input type="text" id="cmd" placeholder="Diga: 'Abra o editor.html' ou 'Ligar para...'">
            <button class="btn-core" onclick="processar()">EXECUTAR</button>
        </div>
    </div>

    <input type="file" id="file-engine" webkitdirectory directory multiple style="display:none">

    <script>
        const display = document.getElementById('display');
        const cmdInput = document.getElementById('cmd');
        const fileEngine = document.getElementById('file-engine');
        let database = [];

        // RELÓGIO INDUSTRIAL
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        function log(msg, color = var(--neon)) {
            const div = document.createElement('div');
            div.className = 'line';
            div.style.color = color;
            div.innerHTML = `> ${msg}`;
            display.appendChild(div);
            display.scrollTop = display.scrollHeight;
        }

        function mapear() {
            log("SOLICITANDO ACESSO AO ARMAZENAMENTO...", "yellow");
            fileEngine.click();
        }

        fileEngine.onchange = (e) => {
            database = Array.from(e.target.files);
            log(`VARREDURA COMPLETA: ${database.length} ARQUIVOS INDEXADOS.`, "#00ff00");
            log("INTELIGÊNCIA PRONTA PARA ABRIR QUALQUER ARQUIVO.");
        };

        function comandoRapido(txt) {
            cmdInput.value = txt;
            processar();
        }

        function processar() {
            const raw = cmdInput.value.trim();
            const cmd = raw.toLowerCase();
            cmdInput.value = '';

            if(!cmd) return;
            log(`PROCESSANDO: "${raw}"`, "white");

            // 1. LÓGICA PARA ABRIR APPS DO SISTEMA
            if(cmd.includes("whatsapp")) {
                log("DISPARANDO PROTOCOLO WHATSAPP...");
                window.location.href = "whatsapp://send";
                return;
            }
            if(cmd.includes("youtube")) {
                log("DISPARANDO PROTOCOLO YOUTUBE...");
                window.location.href = "intent://www.youtube.com#Intent;package=com.google.android.youtube;scheme=https;end";
                return;
            }
            if(cmd.includes("maps") || cmd.includes("mapa")) {
                log("DISPARANDO PROTOCOLO GOOGLE MAPS...");
                window.location.href = "https://www.google.com/maps";
                return;
            }

            // 2. LÓGICA PARA ABRIR ARQUIVOS DO CELULAR (MAPEADOS)
            if(cmd.includes("abra") || cmd.includes("abrir") || cmd.includes("execute")) {
                const alvo = cmd.replace(/abra|abrir|execute|o|arquivo/g, "").trim();
                const arquivo = database.find(f => f.name.toLowerCase().includes(alvo));

                if(arquivo) {
                    log(`ARQUIVO ENCONTRADO: ${arquivo.name}`, "#00f3ff");
                    abrirArquivo(arquivo);
                } else {
                    log(`ERRO: O ARQUIVO "${alvo}" NÃO FOI LOCALIZADO. REALIZE O MAPEAMENTO.`, "red");
                }
            }
        }

        function abrirArquivo(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const content = e.target.result;
                if(file.name.endsWith('.html')) {
                    const win = window.open();
                    win.document.write(content);
                } else {
                    const url = URL.createObjectURL(file);
                    window.open(url, '_blank');
                }
            };
            
            if(file.name.endsWith('.html') || file.name.endsWith('.txt')) {
                reader.readAsText(file);
            } else {
                const url = URL.createObjectURL(file);
                window.open(url, '_blank');
            }
        }

        function limpar() { display.innerHTML = ''; log("TERMINAL REINICIADO."); }

        // ENTER
        cmdInput.addEventListener("keyup", (e) => { if(e.key === "Enter") processar(); });
    </script>
</body>
</html>
