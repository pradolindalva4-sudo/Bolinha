<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000">
    <title>HELENA v50.0 - VOICE CONTROL</title>
    
    <link rel="manifest" href="data:application/manifest+json,{'name':'HELENA VOICE','short_name':'HELENA','start_url':'.','display':'standalone','background_color':'#000','theme_color':'#00f3ff'}">

    <style>
        :root { --neon: #00f3ff; --gold: #ffcc00; --red: #ff0044; --bg: #000; }
        body { margin: 0; background: var(--bg); color: var(--neon); font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* PULSO DE VOZ (INDICADOR DE ESCUTA) */
        #voice-pulse {
            width: 80px; height: 80px; background: rgba(0, 243, 255, 0.1);
            border: 2px solid var(--neon); border-radius: 50%;
            margin: 20px auto; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px var(--neon); transition: 0.3s;
        }
        .listening { animation: pulse-red 1.5s infinite; border-color: var(--red) !important; box-shadow: 0 0 30px var(--red) !important; }
        @keyframes pulse-red { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }

        /* CONSOLE INDUSTRIAL */
        #console { 
            height: 40vh; background: #050505; margin: 10px; border: 1px solid #222; 
            padding: 15px; font-family: 'Courier New', monospace; font-size: 14px; overflow-y: auto;
            border-radius: 10px; box-shadow: inset 0 0 10px #000;
        }
        .cmd { color: var(--gold); font-weight: bold; }
        .res { color: #fff; margin-bottom: 10px; border-bottom: 1px solid #111; padding-bottom: 5px; }

        /* BOTÕES DE CONTROLE */
        #controls { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-supreme { 
            background: #111; border: 2px solid var(--neon); color: var(--neon); 
            padding: 20px; border-radius: 12px; font-weight: bold; text-transform: uppercase;
        }
        .btn-active { background: var(--neon); color: #000; }

        #status-bar { background: var(--neon); color: #000; padding: 5px 15px; font-size: 10px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div id="status-bar">SISTEMA JDP INDUSTRIAL - KERNEL v50.0 ATIVO</div>

<div id="voice-pulse" id="mic-icon">
    <span id="mic-text" style="font-size: 10px;">OFF</span>
</div>

<div id="console" id="console-div">
    <div class="res">> AGUARDANDO ATIVAÇÃO DE VOZ...</div>
</div>

<div id="controls">
    <button class="btn-supreme" onclick="toggleVoice()" id="btn-voice">🎤 ATIVAR VOZ</button>
    <button class="btn-supreme" onclick="document.getElementById('file-input').click()">📂 SINCRONIZAR</button>
</div>

<div style="padding: 0 15px;">
    <input type="text" id="manual-search" style="width:100%; padding:15px; background:#111; border:1px solid #333; color:#fff; border-radius:10px;" placeholder="OU DIGITE O COMANDO...">
</div>

<input type="file" id="file-input" webkitdirectory directory multiple style="display:none">

<script>
    const consoleDiv = document.getElementById('console');
    const micIcon = document.getElementById('voice-pulse');
    const micText = document.getElementById('mic-text');
    let BANCO_DADOS = [];
    let recognition;
    let isListening = false;

    // CONFIGURAÇÃO DO OUVIDO DA HELENA
    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = false;
        recognition.lang = 'pt-BR';

        recognition.onstart = () => {
            isListening = true;
            micIcon.classList.add('listening');
            micText.innerText = "OUVINDO";
            log("HELENA ESTÁ OUVINDO...", "var(--neon)");
        };

        recognition.onresult = (event) => {
            const comando = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
            processarComando(comando);
        };

        recognition.onend = () => {
            if(isListening) recognition.start(); // Auto-restart para manter sempre ouvindo
        };
    }

    function log(msg, color = "#fff") {
        const div = document.createElement('div');
        div.className = 'res';
        div.style.color = color;
        div.innerHTML = `> ${msg}`;
        consoleDiv.appendChild(div);
        consoleDiv.scrollTop = consoleDiv.scrollHeight;
    }

    function toggleVoice() {
        if(!isListening) {
            recognition.start();
            document.getElementById('btn-voice').classList.add('btn-active');
        } else {
            recognition.stop();
            isListening = false;
            micIcon.classList.remove('listening');
            micText.innerText = "OFF";
            document.getElementById('btn-voice').classList.remove('btn-active');
            log("VOZ DESATIVADA.", "red");
        }
    }

    function processarComando(cmd) {
        log(`COMANDO RECEBIDO: <span class="cmd">"${cmd}"</span>`);

        if(cmd.includes("whatsapp")) {
            log("ABRINDO WHATSAPP...", "var(--gold)");
            window.location.href = "intent://#Intent;scheme=whatsapp;package=com.whatsapp;end";
        } 
        else if(cmd.includes("sincronizar")) {
            log("INICIANDO SINCRONIZAÇÃO DE DISCO...", "var(--gold)");
            document.getElementById('file-input').click();
        }
        else if(cmd.includes("abrir")) {
            const alvo = cmd.replace("abrir", "").trim();
            abrirArquivoPorVoz(alvo);
        }
        else if(cmd.includes("limpar")) {
            consoleDiv.innerHTML = "";
            log("CONSOLE LIMPO.");
        }
    }

    // BUSCA E EXECUÇÃO NO INTERIOR DO APARELHO
    document.getElementById('file-input').onchange = function(e) {
        const files = Array.from(e.target.files);
        BANCO_DADOS = files.map(f => ({ name: f.name.toLowerCase(), handle: f }));
        log(`SINCRONIZADO: ${files.length} ARQUIVOS MAPEADOS NO INTERIOR.`, "var(--gold)");
    };

    function abrirArquivoPorVoz(nome) {
        log(`BUSCANDO POR: ${nome}...`);
        const encontrado = BANCO_DADOS.find(f => f.name.includes(nome));
        if(encontrado) {
            log(`SUCESSO! ABRINDO ${encontrado.handle.name}`, "#0f0");
            const url = URL.createObjectURL(encontrado.handle);
            window.open(url, '_blank');
        } else {
            log(`ERRO: ARQUIVO "${nome}" NÃO ENCONTRADO NO DISCO.`, "red");
        }
    }
</script>

</body>
</html>
