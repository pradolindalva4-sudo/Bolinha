<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HELENA v13.5 - CORTEX REAL</title>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.js"></script> <!-- Inteligência de Busca -->
    <style>
        :root {
            --neon: #00f3ff;
            --dark: #050505;
            --industrial: #1a1a1a;
        }

        body {
            margin: 0; background: var(--dark); color: var(--neon);
            font-family: 'Orbitron', sans-serif; overflow: hidden; height: 100vh;
        }

        /* BOLINHA FLUTUANTE REAL */
        #floating-core {
            position: fixed;
            width: 70px; height: 70px;
            background: radial-gradient(circle, var(--neon), #000);
            border-radius: 50%;
            box-shadow: 0 0 25px var(--neon);
            z-index: 9999;
            cursor: move;
            display: flex; align-items: center; justify-content: center;
            touch-action: none; /* Permite arrastar no celular */
            border: 2px solid #fff;
        }

        #floating-core::after {
            content: "JDP"; font-size: 10px; color: white; font-weight: bold;
        }

        /* PAINEL DE COMANDO */
        #command-panel {
            position: fixed;
            bottom: -100%; left: 0; width: 100%; height: 70%;
            background: rgba(10, 10, 10, 0.98);
            border-top: 3px solid var(--neon);
            transition: 0.5s cubic-bezier(0.1, 0.7, 0.1, 1);
            z-index: 9998;
            padding: 20px; box-sizing: border-box;
            display: flex; flex-direction: column;
        }

        #command-panel.active { bottom: 0; }

        .terminal {
            flex: 1; background: #000; border: 1px solid #222;
            padding: 15px; overflow-y: auto; font-family: monospace;
            font-size: 12px; color: #00ff00; margin-bottom: 15px;
        }

        .input-box {
            display: flex; gap: 10px; background: #111; padding: 10px; border-radius: 5px;
        }

        input {
            flex: 1; background: transparent; border: none; color: var(--neon);
            outline: none; font-size: 16px;
        }

        .btn-action {
            background: var(--neon); color: #000; border: none;
            padding: 10px 15px; font-weight: bold; border-radius: 4px;
        }

        .file-card {
            background: #1a1a1a; padding: 10px; margin: 5px 0;
            border-left: 4px solid var(--neon); display: flex; justify-content: space-between;
        }
    </style>
</head>
<body>

    <!-- BOLINHA FLUTUANTE -->
    <div id="floating-core"></div>

    <!-- PAINEL DE CONTROLE -->
    <div id="command-panel">
        <div style="display:flex; justify-content: space-between; margin-bottom: 10px;">
            <span>SISTEMA HELENA v13.5</span>
            <button onclick="initFileSystem()" style="background:red; color:white; border:none; padding:5px;">CONECTAR ARQUIVOS</button>
        </div>
        
        <div class="terminal" id="log">
            > AGUARDANDO SINCRONIZAÇÃO COM O DISPOSITIVO...<br>
            > SR. JOSÉ, CLIQUE EM "CONECTAR ARQUIVOS" PARA ME DAR ACESSO.
        </div>

        <div class="input-box">
            <input type="text" id="cmdInput" placeholder="Ex: 'Abra o PDF da JDP' ou 'O que tem de novo?'">
            <button class="btn-action" onclick="executarComando()">EXECUTAR</button>
        </div>
    </div>

    <script>
        let dbFiles = []; // Banco de dados de arquivos real
        const panel = document.getElementById('command-panel');
        const log = document.getElementById('log');
        const core = document.getElementById('floating-core');

        // --- LÓGICA DE ARRASTAR A BOLINHA ---
        let isDragging = false;
        core.onpointerdown = (e) => { isDragging = false; core.setPointerCapture(e.pointerId); };
        core.onpointermove = (e) => {
            isDragging = true;
            core.style.left = (e.clientX - 35) + 'px';
            core.style.top = (e.clientY - 35) + 'px';
        };
        core.onpointerup = (e) => {
            if (!isDragging) togglePanel(); // Se só clicou, abre o painel
        };

        function togglePanel() {
            panel.classList.toggle('active');
        }

        function printLog(msg, color = "#00ff00") {
            log.innerHTML += `<div style="color:${color}">> ${msg}</div>`;
            log.scrollTop = log.scrollHeight;
        }

        // --- ACESSO REAL AO SISTEMA DE ARQUIVOS ---
        async function initFileSystem() {
            try {
                printLog("SOLICITANDO PERMISSÃO DE ACESSO À RAIZ...", "yellow");
                // Abre o seletor de pasta do Android/PC
                const directoryHandle = await window.showDirectoryPicker();
                dbFiles = [];
                await scanDirectory(directoryHandle);
                printLog(`SUCESSO! ${dbFiles.length} ARQUIVOS INDEXADOS NO CORTEX.`, var(--neon));
            } catch (err) {
                printLog("ERRO: O Sr. precisa selecionar uma pasta para eu trabalhar.", "red");
            }
        }

        async function scanDirectory(handle) {
            for await (const entry of handle.values()) {
                if (entry.kind === 'file') {
                    dbFiles.push({ name: entry.name, handle: entry });
                } else if (entry.kind === 'directory') {
                    await scanDirectory(entry);
                }
            }
        }

        // --- INTELIGÊNCIA DE COMANDO ---
        function executarComando() {
            const input = document.getElementById('cmdInput').value.toLowerCase();
            document.getElementById('cmdInput').value = '';
            
            if (dbFiles.length === 0) {
                printLog("ERRO: Primeiro conecte os arquivos no botão vermelho.", "red");
                return;
            }

            printLog(`PROCESSANDO: "${input}"...`, "white");

            // Lógica de busca "Abra o arquivo X"
            if (input.includes("abra") || input.includes("buscar")) {
                const searchName = input.replace("abra", "").replace("arquivo", "").trim();
                
                // Usando Fuse.js para busca inteligente (mesmo que digite errado)
                const fuse = new Fuse(dbFiles, { keys: ['name'], threshold: 0.4 });
                const result = fuse.search(searchName);

                if (result.length > 0) {
                    const file = result[0].item;
                    printLog(`ARQUIVO ENCONTRADO: ${file.name}`, "var(--neon)");
                    abrirArquivo(file);
                } else {
                    printLog("ARQUIVO NÃO LOCALIZADO NO BANCO JDP.", "red");
                }
            }
        }

        async function abrirArquivo(file) {
            const fileData = await file.handle.getFile();
            const url = URL.createObjectURL(fileData);
            printLog("EXECUTANDO ABERTURA DE BINÁRIO...");
            window.open(url, '_blank');
        }

    </script>
</body>
</html>
