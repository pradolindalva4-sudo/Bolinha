<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HELENA v60.0 - SUPREME CORE</title>
    <style>
        :root { --neon: #00f3ff; --gold: #ffcc00; --bg: #000; }
        body { margin: 0; background: var(--bg); color: var(--neon); font-family: 'Arial Black', sans-serif; text-align: center; overflow: hidden; }
        
        /* INTERFACE INDUSTRIAL JDP */
        #header { padding: 20px; border-bottom: 5px solid var(--neon); background: #050505; }
        .status-text { font-size: 12px; color: var(--gold); letter-spacing: 2px; }

        /* NÚCLEO DE ESCUTA */
        #core-sphere {
            width: 150px; height: 150px; border: 5px solid var(--neon); border-radius: 50%;
            margin: 30px auto; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px var(--neon); transition: 0.5s;
            cursor: pointer; position: relative;
        }
        .active-listening { border-color: #ff0044 !important; box-shadow: 0 0 50px #ff0044 !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* CONSOLE DE DADOS */
        #terminal {
            height: 25vh; background: #050505; margin: 15px; border: 1px solid #222;
            padding: 15px; font-family: monospace; font-size: 14px; color: #0f0;
            overflow-y: auto; text-align: left; border-radius: 10px;
        }

        /* BOTÕES DE COMANDO */
        .btn-jdp {
            width: 90%; padding: 25px; margin: 10px 0; border: none; border-radius: 15px;
            font-size: 18px; font-weight: 900; text-transform: uppercase;
            background: linear-gradient(145deg, #00f3ff, #0088ff); color: #000;
            box-shadow: 0 5px 15px rgba(0,243,255,0.4);
        }
        .btn-sync { background: var(--gold) !important; }

        #file-info { font-size: 10px; color: #666; margin-top: 5px; }
    </style>
</head>
<body>

<div id="header">
    <div style="font-size: 24px;">HELENA v60.0</div>
    <div class="status-text">SISTEMA DE CONTROLE JDP INDUSTRIAL</div>
</div>

<div id="core-sphere" onclick="ativarHelena()">
    <span id="core-label">ATIVAR<br>HELENA</span>
</div>

<div id="terminal">
    > SISTEMA OFFLINE. AGUARDANDO COMANDO DO SR. JOSÉ...
</div>

<button class="btn-jdp btn-sync" onclick="document.getElementById('master-sync').click()">
    ⚙️ SINCRONIZAR NÚCLEO (INTERIOR)
</button>

<input type="file" id="master-sync" webkitdirectory directory multiple style="display:none">

<div id="file-info">NENHUM ARQUIVO MAPEADO NO DISCO INTERNO.</div>

<script>
    const terminal = document.getElementById('terminal');
    const core = document.getElementById('core-sphere');
    const coreLabel = document.getElementById('core-label');
    let BANCO_DADOS = [];
    let recognition;
    let synth = window.speechSynthesis;

    // HELENA FALA COM O SR. JOSÉ
    function falar(texto) {
        const utter = new SpeechSynthesisUtterance(texto);
        utter.lang = 'pt-BR';
        utter.rate = 0.9;
        synth.speak(utter);
    }

    function log(msg, color = "#0f0") {
        const div = document.createElement('div');
        div.style.color = color;
        div.innerHTML = `> ${msg}`;
        terminal.appendChild(div);
        terminal.scrollTop = terminal.scrollHeight;
    }

    // CONFIGURAÇÃO DO OUVIDO
    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = false;
        recognition.lang = 'pt-BR';

        recognition.onresult = (event) => {
            const comando = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
            processarVoz(comando);
        };
    }

    function ativarHelena() {
        try {
            recognition.start();
            core.classList.add('active-listening');
            coreLabel.innerHTML = "OUVINDO...";
            log("HELENA ATIVA. PODE FALAR, SR. JOSÉ.", "var(--neon)");
            falar("Sim, Senhor José. Estou ouvindo.");
        } catch(e) {
            log("ERRO: REINICIE O NAVEGADOR.", "red");
        }
    }

    // SINCRONIZAÇÃO DO INTERIOR
    document.getElementById('master-sync').onchange = function(e) {
        const files = Array.from(e.target.files);
        if(files.length > 0) {
            BANCO_DADOS = files.map(f => ({ name: f.name.toLowerCase(), file: f }));
            document.getElementById('file-info').innerText = `${files.length} ARQUIVOS MAPEADOS NO INTERIOR.`;
            log(`SUCESSO! ${files.length} ARQUIVOS SINCRONIZADOS.`, "var(--gold)");
            falar("Interior do aparelho mapeado com sucesso. O que deseja buscar?");
        }
    };

    function processarVoz(cmd) {
        log(`COMANDO: "${cmd}"`, "var(--gold)");

        if(cmd.includes("whatsapp")) {
            falar("Abrindo WhatsApp.");
            window.location.href = "intent://#Intent;scheme=whatsapp;package=com.whatsapp;end";
        } 
        else if(cmd.includes("abrir")) {
            const busca = cmd.replace("abrir", "").trim();
            const arquivo = BANCO_DADOS.find(f => f.name.includes(busca));
            
            if(arquivo) {
                falar(`Abrindo arquivo ${busca}.`);
                const url = URL.createObjectURL(arquivo.file);
                window.open(url, '_blank');
            } else {
                falar(`Senhor José, não encontrei o arquivo ${busca} no interior.`);
            }
        }
        else if(cmd.includes("limpar")) {
            terminal.innerHTML = "";
            falar("Console limpo.");
        }
    }
</script>

</body>
</html>
